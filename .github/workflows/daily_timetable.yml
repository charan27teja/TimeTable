name: Daily Timetable Notification

on:
  schedule:
    # This runs every day at 01:30 AM UTC (exactly 7:00 AM Indian Standard Time)
    - cron: '30 1 * * *'
  workflow_dispatch: # Allows you to manually click a button on GitHub to test run it anytime

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl

    - name: Execute Timetable Script
      run: python projecttime.py
